    request_retries: 1
    allow_localhost_alias: false
    allow_port_override: false
    max_frame_long_edge: 1280
    max_frame_pixels: 1048576
    max_tokens: 512
    max_new_tokens: 512
    temperature: 0.1
    load_in_4bit: true
    local_path: /home/fazil/.cache/huggingface/hub/models--Qwen--Qwen3-VL-30B-A3B-Instruct/snapshots/9c4b90e1e4ba969fd3b5378b57d966d725f1b86c
