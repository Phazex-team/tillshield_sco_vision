cameras:
- id: cam_01
  name: "Return Counter \u2014 Qusais"
  rtsp_url: rtsp://127.0.0.1:8554/CS_COUNTER_ch15
  # ``return_review`` is review-safe: the VLM describes evidence; the
  # deterministic ``reasoning.decision_policy`` decides the outcome.
  # The legacy key ``fraud`` is silently remapped to this one — see
  # classifiers.get_classifier.
  classifier: return_review
  token_budget: 1120
  enable_thinking: ''
  max_frames: ''
  cooldown_sec: 30
  zones:
    customer_zone:
      x: 874
      y: 29
      w: 360
      h: 607
    staff_zone:
      x: 570
      y: 4
      w: 303
      h: 645
  prompts: {}
settings:
  rtsp_reconnect_sec: 10
  motion_threshold: 25
  motion_area_ratio: 0.02
  pre_roll_sec: 5
  session_end_empty_sec: 30
  session_max_sec: 60
  min_session_sec: 2
  session_merge_window_sec: 45
  session_merge_similarity_threshold: 0.6
  roi_crop_enabled: true
  roi_crop_margin_pct: 0.1
  gemma_video_fps: 1
  gemma_video_max_seconds: 20
  gemma_video_fps_source: 5
  mp4_evidence_width: 640
  mp4_evidence_height: 360
  mp4_evidence_fps: 5
  mp4_evidence_crf: 28
  log_dir: /home/fazil/workspace/projects/fraud_detection_v3/logs
  video_dir: /home/fazil/workspace/projects/fraud_detection_v3/videos
  snapshot_dir: /home/fazil/workspace/projects/fraud_detection_v3/logs/snapshots
  retention_days: 7
  retention_check_interval_hours: 6
  http_host: 0.0.0.0
  http_port: 3902
  inference_queue_max: 10
models:
  falcon:
    name: tiiuae/Falcon-Perception
  # Active reasoning provider. Must equal the name served by
  # transformers_server.py / vllm_start.sh — mismatched names show up as
  # the wrong model in tracer/Phoenix spans and break the inspector.
  gemma:
    name: google/gemma-4-26B-A4B-it
    vllm_url: http://localhost:8001
    max_tokens: 512
    temperature: 0.1
    request_timeout_sec: 300
    request_retries: 3
    request_retry_backoff_sec: 5
  # Primary visual evidence verifier when ENABLED + repo-local weights
  # resolve. The ChainProvider (reasoning/providers/chain.py) tries
  # Qwen first and falls back to Gemma on load/inference failure. The
  # decision policy still wraps every result.
  #
  # ``local_path`` is a development fallback only; production mode
  # (FRAUD_OFFLINE_MODE=1) ignores it and requires the repo-local
  # ./models/hf/Qwen/Qwen3-VL-30B-A3B-Instruct/<snapshot>/ bundle.
  qwen3_vl:
    enabled: true
    name: Qwen/Qwen3-VL-30B-A3B-Instruct
    max_new_tokens: 512
    temperature: 0.1
    local_path: /home/fazil/.cache/huggingface/hub/models--Qwen--Qwen3-VL-30B-A3B-Instruct/snapshots/9c4b90e1e4ba969fd3b5378b57d966d725f1b86c
observability:
  phoenix_enabled: true
  phoenix_url: http://localhost:6006
  phoenix_project: fraud_detection_v3
