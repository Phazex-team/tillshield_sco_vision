cameras:
- id: cam_01
  name: "Return Counter \u2014 Qusais"
  rtsp_url: rtsp://127.0.0.1:8554/CS_COUNTER_ch15
  # ``return_review`` is review-safe: the VLM describes evidence; the
  # deterministic ``reasoning.decision_policy`` decides the outcome.
  # The legacy key ``fraud`` is silently remapped to this one — see
  # classifiers.get_classifier.
  classifier: return_review
  token_budget: 1120
  enable_thinking: ''
  max_frames: ''
  cooldown_sec: 30
  zones:
    customer_zone:
      x: 874
      y: 29
      w: 360
      h: 607
    staff_zone:
      x: 570
      y: 4
      w: 303
      h: 645
  prompts: {}
# Return-counter cameras. Each return-counter workstation in the
# TillShield poll allowlist must map to one of these IDs (see
# integrations.tillshield.workstation_camera_map) and each must carry a
# real rtsp_url so the recorder/window builder can resolve footage.
- id: cam_return_01
  name: "Return Counter 01"
  # POS workstation 52 -> this camera (channel 15). The RTSP password must
  # be URL-encoded in the URL (e.g. '%' -> %25).
  # Secret: real URL lives in .env (gitignored) as CAM_RETURN_01_RTSP_URL;
  # load_config expands ${VAR} from the environment.
  rtsp_url: '${CAM_RETURN_01_RTSP_URL}'
  classifier: return_review
  token_budget: 1120
  enable_thinking: ''
  max_frames: ''
  cooldown_sec: 30
  zones: {}
  prompts: {}
  # On-demand NVR historical retrieval (additive; the live recorder
  # remains the fallback until clip export is proven reliable).
  nvr:
    enabled: true
    base_url: http://192.168.1.13
    # Secrets: real values in .env (gitignored). The NVR client also
    # reads NVR_USERNAME / NVR_PASSWORD from the environment directly.
    username: ${NVR_USERNAME}
    password: ${NVR_PASSWORD}
    live_channel: 15              # 1-based RTSP channel (live + playback URL)
    # mediaFileFind condition.Channel (1-based on this NVR). Searching 15
    # returns results labelled Channel=14 under /mnt/dvr/.../14/dav/ — the
    # SAME camera (0-based result). Set to whatever returns this camera's
    # recordings; the resolved result channel + file path are logged.
    playback_channel: 15
    subtype: 0
    timezone: Asia/Dubai          # NVR local wall-clock for search/playback
    pre_roll_sec: 120
    post_roll_sec: 180
    max_window_sec: 900           # hard cap: only the tx window (<= 15 min)
    prefer_on_demand_for_pos: true
    # Stage B clip export via RTSP playback-by-time (PROVEN against this
    # NVR: pulls the exact bounded tx window to MP4). Streams at ~realtime
    # so a 5-min window takes ~5 min; bounded by max_window_sec. On any
    # failure the app falls back to the local recorded segments.
    export_enabled: true
settings:
  rtsp_reconnect_sec: 10
  motion_threshold: 25
  motion_area_ratio: 0.02
  pre_roll_sec: 5
  session_end_empty_sec: 30
  session_max_sec: 60
  min_session_sec: 2
  session_merge_window_sec: 45
  session_merge_similarity_threshold: 0.6
  roi_crop_enabled: true
  roi_crop_margin_pct: 0.1
  gemma_video_fps: 1
  gemma_video_max_seconds: 20
  gemma_video_fps_source: 5
  mp4_evidence_width: 640
  mp4_evidence_height: 360
  mp4_evidence_fps: 5
  mp4_evidence_crf: 28
  log_dir: ./logs
  video_dir: ./videos
  snapshot_dir: ./logs/snapshots
  retention_days: 7
  retention_check_interval_hours: 6
  http_host: 0.0.0.0
  http_port: 3902
  inference_queue_max: 10
models:
  falcon:
    name: tiiuae/Falcon-Perception
  # Active reasoning provider. Must equal the name served by
  # transformers_server.py / vllm_start.sh — mismatched names show up as
  # the wrong model in tracer/Phoenix spans and break the inspector.
  gemma:
    name: google/gemma-4-26B-A4B-it
    vllm_url: http://localhost:8001
    max_tokens: 512
    temperature: 0.1
    request_timeout_sec: 300
    request_retries: 3
    request_retry_backoff_sec: 5
  # Primary visual evidence verifier when ENABLED + repo-local weights
  # resolve. The ChainProvider (reasoning/providers/chain.py) tries
  # Qwen first and falls back to Gemma on load/inference failure. The
  # decision policy still wraps every result.
  #
  # ``local_path`` is a development fallback only; production mode
  # (FRAUD_OFFLINE_MODE=1) ignores it and requires the repo-local
  # ./models/hf/Qwen/Qwen3-VL-30B-A3B-Instruct/<snapshot>/ bundle.
  qwen3_vl:
    enabled: true
    name: Qwen/Qwen3-VL-30B-A3B-Instruct
    max_new_tokens: 512
    temperature: 0.1
    # 4-bit (nf4) load: the bf16 30B peaks >121G on this box and OOMs;
    # 4-bit keeps it ~18G resident. bitsandbytes verified on GB10.
    load_in_4bit: true
    local_path: /home/fazil/.cache/huggingface/hub/models--Qwen--Qwen3-VL-30B-A3B-Instruct/snapshots/9c4b90e1e4ba969fd3b5378b57d966d725f1b86c
  # Segmentation model used by the perception pipeline. The path is
  # resolved to ./models/hf/facebook/sam2-hiera-large/<snapshot>/ by
  # app.config.resolve_model_path. The ``sam2`` Python runtime is
  # required separately — see scripts/verify_offline_python_env.py and
  # offline_assets.yaml.required_python_packages.
  sam2:
    name: facebook/sam2-hiera-large
    enabled: true
  # Optional preferred OCR upgrade. When ``tiiuae/Falcon-OCR`` is
  # bundled under ./models/hf/, perception.ocr loads the real
  # OCRInferenceEngine. Otherwise OCR is honestly marked unavailable.
  falcon_ocr:
    name: tiiuae/Falcon-OCR
    # Optional preferred upgrade. Off by default because the weights
    # are not part of the required bundle. When the operator bundles
    # tiiuae/Falcon-OCR via prepare_offline_model_bundle.py and flips
    # this to true, perception.ocr will run real OCRInferenceEngine
    # on receipt/document crops automatically.
    enabled: false
observability:
  phoenix_enabled: true
  phoenix_url: http://localhost:6006
  phoenix_project: fraud_detection_v3

# ----------------------------------------------------------------------
# Memory + reasoning policy (PRODUCTION_SPEC.md sections 7 + 11)
# Memory limits are in GiB of total system RAM (DGX unified memory pool).
# The guard polls system memory and refuses inference / unloads models
# as the soft/hard/emergency thresholds are crossed.
# ----------------------------------------------------------------------
reasoning:
  # Qwen3-VL (4-bit) is the active/primary reasoner. Gemma stays as a
  # lazy HTTP fallback (transformers_server on :8001) — with
  # warm_fallback:false it is NEVER loaded unless Qwen errors, so the two
  # are never resident together. This preserves the chain architecture
  # while analysis runs on Qwen alone in practice.
  primary_provider: qwen3_vl
  fallback_provider: gemma
  warm_fallback: false
  prompt_version: return_review_v1

gpu:
  max_loaded_big_vlms: 1
  soft_memory_limit_gb: 90
  hard_memory_limit_gb: 100
  emergency_memory_limit_gb: 110
  poll_interval_sec: 5
  on_hard_limit: unload_models
  on_emergency_limit: stop_inference_workers

# ----------------------------------------------------------------------
# Storage retention (PRODUCTION_SPEC reliability rules)
# Raw continuous CCTV segments that are NOT linked to a case / evidence
# package may be deleted after `raw_segment_retention_hours`. Anything
# linked to a case (window, artifact, review action, audit log) is
# preserved indefinitely until an admin manually archives it.
# `min_free_disk_gb` is the low-disk guard threshold: when the project
# storage root drops below it, the recorder pauses but the API and
# reviewer UI stay alive.
# ----------------------------------------------------------------------
storage:
  raw_segment_retention_hours: 10
  # PRODUCTION_SPEC defaults: keep at least 100 GiB free on the storage
  # root. The DGX Spark target ships with a 4 TB NVMe; 100 GiB is the
  # conservative buffer that leaves room for one fully-bundled model
  # refresh (~110 GiB) without contention. Do not lower without first
  # measuring real headroom — never below 25 GiB.
  min_free_disk_gb: 100
  cleanup_dry_run_default: true

# ----------------------------------------------------------------------
# Integrations (POS agents)
# ----------------------------------------------------------------------
integrations:
  tillshield:
    return_event_types:
      - RETURN
      - REFUND
      - REFUND_RETURN
      - RETURN_REFUND
      - VOID_RETURN
    line_level_cases: false
    ignore_unknown_types: true
    # When unset (default) the endpoint is unauthenticated (dev mode).
    # Production should set TILLSHIELD_INGEST_TOKEN in .env so the agent
    # must send X-PhazeX-Ingest-Token on every call.
    ingest_token: ""

    # ----------------------------------------------------------------
    # POS-agent polling (additive; the push endpoints above still work).
    # The app pulls recent transactions from the local TillShield POS
    # agent every poll_every_seconds and opens cases only for RETURN
    # rows with a negative total at an allow-listed return-counter
    # workstation that maps to a configured camera. Correlation always
    # uses the row's transactionDate, never poll time.
    # ----------------------------------------------------------------
    poll_enabled: true
    # The POS agent reports transactionDate in this timezone (its
    # transactionEndDate is UTC, ~4h behind). pos_event_at is normalised
    # to UTC on ingest so it correlates with the UTC CCTV segments.
    # IANA name or fixed offset (e.g. "+04:00").
    pos_timezone: "Asia/Dubai"
    base_url: http://localhost:8081
    info_path: /pos/data/info
    # Per-workstation range feed: ?workstationId=<id>&start=<ISO>&end=<ISO>
    transactions_path: /pos/data/transactions
    poll_every_seconds: 300        # query the agent every 5 minutes
    request_timeout_sec: 30
    # First poll with no checkpoint looks back this far; subsequent polls
    # resume from the per-workstation cursor.
    poll_lookback_seconds: 900
    require_negative_amount: true
    # Return-counter workstations (canonical terminal_id after TillShield
    # normalisation). Only these open cases via the poller.
    allowed_workstation_ids:
      - "52"
    # Each allow-listed workstation MUST map to a camera id defined under
    # cameras: above, and that camera MUST carry a real rtsp_url.
    workstation_camera_map:
      "52": cam_return_01
