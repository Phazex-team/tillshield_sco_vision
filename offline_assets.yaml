# Offline asset registry for fraud_detection_v3.
#
# This file is the SINGLE declaration of every model / data asset the
# production runtime is allowed to depend on. The prepare and verify
# scripts read this; the runtime fails fast if any "required" entry is
# missing from ./models/hf/<repo>/<name>/<snapshot>/ when
# FRAUD_OFFLINE_MODE=1.
#
# All paths are relative to the repo root. Do NOT add entries pointing
# into ~/.cache/huggingface — those are dev-mode fallbacks resolved by
# app.config.resolve_model_path, not bundle members.
#
# Asset role tags (advisory; used by perception/reasoning glue):
#   role: reasoner_primary   # Qwen3-VL when enabled, else Gemma
#   role: reasoner_fallback  # Gemma BF16
#   role: detector           # Falcon-Perception object detection
#   role: ocr                # OCR — Falcon-Perception covers this
#   role: segmenter          # SAM 2 (deployable today)

schema_version: 2

required:
  # ----------------------------------------------------------------
  # Reasoning providers
  # ----------------------------------------------------------------
  - name: qwen3_vl
    role: reasoner_primary
    purpose: "Primary visual evidence verifier. Reads structured evidence + frames and emits review-safe JSON."
    repo: Qwen/Qwen3-VL-30B-A3B-Instruct
    cache_path: /home/fazil/.cache/huggingface/hub/models--Qwen--Qwen3-VL-30B-A3B-Instruct
    runtime_blocking: true
    notes: |
      Architecture: Qwen3VLMoeForConditionalGeneration (transformers >= 5.6).
      Activate via models.qwen3_vl.enabled=true in config.yaml. The
      ChainProvider falls back to Gemma if Qwen load/inference fails.

  - name: gemma_bf16
    role: reasoner_fallback
    purpose: "Fallback reasoner used when Qwen3-VL is unavailable or returns an error."
    repo: google/gemma-4-26B-A4B-it
    cache_path: /home/fazil/.cache/huggingface/hub/models--google--gemma-4-26B-A4B-it
    runtime_blocking: true
    notes: |
      Served via transformers_server.py (BF16). NVFP4 unsupported on
      this DGX Spark (sm_121) — see memory/project_bf16_fallback.md.

  # ----------------------------------------------------------------
  # Perception: detection + OCR + segmentation
  # ----------------------------------------------------------------
  - name: falcon_perception
    role: detector_and_ocr
    purpose: |
      Open-vocabulary object detection AND OCR. The published
      tiiuae/Falcon-Perception checkpoint performs detection,
      segmentation, AND OCR via natural-language queries (per the
      upstream README), so one checkpoint covers both perception tasks.
    repo: tiiuae/Falcon-Perception
    cache_path: /home/fazil/.cache/huggingface/hub/models--tiiuae--Falcon-Perception
    runtime_blocking: true
    notes: |
      Detection queries: e.g. "receipt, document, bag, item".
      OCR queries: e.g. "extract all text", "what does this receipt say".
      A dedicated tiiuae/Falcon-OCR variant exists as a benchmark
      optimisation (see optional list) but is NOT required.

  - name: sam2
    role: segmenter
    purpose: "Candidate item segmentation + mask propagation for tracker association."
    repo: facebook/sam2-hiera-large
    cache_path: null
    runtime_blocking: true
    official_source: "https://huggingface.co/facebook/sam2-hiera-large"
    notes: |
      SAM 2 is the actually-deployable segmenter today. SAM 3 was
      announced by Meta but the public checkpoint is not yet available
      on the Hub (see the optional `sam3` entry for the preferred
      upgrade path). Until SAM 3 ships, the perception pipeline uses
      SAM 2 as the primary segmenter and DOES NOT block on SAM 3.

optional:
  # Preferred upgrades — replace the required equivalent above when the
  # upstream release lands and the checkpoint can actually be bundled.
  - name: sam3
    role: segmenter_preferred_upgrade
    purpose: "Preferred segmenter once Meta ships a public SAM 3 checkpoint."
    repo: facebook/sam3-large
    cache_path: null
    runtime_blocking: false
    official_source: "https://huggingface.co/facebook (SAM 3 release pending; track facebook/sam3-* repos when announced)"

  - name: falcon_ocr_specialized
    role: ocr_preferred_upgrade
    purpose: "Dedicated OCR variant for crop-friendly outputs. The base Falcon-Perception already covers OCR; this is a quality optimisation."
    repo: tiiuae/Falcon-OCR
    cache_path: null
    runtime_blocking: false
    official_source: "https://huggingface.co/tiiuae/Falcon-OCR"

  # Benchmark-only assets — never used by the production runtime.
  - name: internvl
    role: benchmark_verifier
    purpose: "Benchmark-only verifier candidate."
    repo: OpenGVLab/InternVL3-78B-MPO
    cache_path: null
    runtime_blocking: false
    official_source: "https://huggingface.co/OpenGVLab"

  - name: grounding_dino
    role: benchmark_grounding
    purpose: "Benchmark-only object grounding model."
    repo: IDEA-Research/grounding-dino-base
    cache_path: null
    runtime_blocking: false
    official_source: "https://huggingface.co/IDEA-Research/grounding-dino-base"

  - name: grounding_dino_1_5
    role: benchmark_grounding
    purpose: "Benchmark-only object grounding model (larger)."
    repo: IDEA-Research/grounding-dino-1.5-pro
    cache_path: null
    runtime_blocking: false
    official_source: "https://huggingface.co/IDEA-Research"

# Non-model artefacts that ALSO travel with the repo. The verifier
# confirms each path is present and non-empty. Repo-relative.
runtime_assets:
  prompts:
    - reasoning/prompts/
  configs:
    - config.yaml
    - offline_assets.yaml
    - .env.example
  db_migrations:
    - db/migrations/0001_core.sql
  static_frontend:
    - static/
  launcher_scripts:
    - start.sh
    - stop.sh
    - status.sh
    - vllm_start.sh
    - install.sh
    - scripts/inspect_models.py
    - scripts/prepare_offline_model_bundle.py
    - scripts/verify_offline_bundle.py
    - scripts/prepare_offline_wheelhouse.py
    - scripts/verify_offline_python_env.py
  python_env:
    - requirements.txt
    - requirements.lock
